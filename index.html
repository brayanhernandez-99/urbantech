<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Urban Tech Colombia</title>

    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="manifest" href="favicon/site.webmanifest">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Fondo difuminado */
        .video-bg {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(45px) brightness(0.4);
            transform: scale(1.3);
            z-index: 1;
        }

        /* Contenedor principal (formato 576x1024) */
        .video-wrapper {
            position: relative;
            width: min(90vw, 576px);
            aspect-ratio: 576 / 1024;
            z-index: 2;
        }

        /* Video principal */
        .video-main {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 18px;
        }

        /* Overlay oscuro */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.12);
            z-index: 3;
            pointer-events: none;
        }

        /* Mensaje de tap */
        .tap-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 18px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }

        /* Mobile full screen */
        @media (max-width: 600px) {
            .video-wrapper {
                width: 100vw;
                height: 100vh;
                aspect-ratio: auto;
            }

            .video-main {
                border-radius: 0;
            }
        }
    </style>
</head>

<body>

    <!-- Fondo difuminado -->
    <video class="video-bg" autoplay muted loop playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>

    <!-- Video principal -->
    <div class="video-wrapper">
        <video class="video-main" autoplay muted loop playsinline>
            <source src="video.mp4" type="video/mp4">
        </video>
    </div>

    <!-- Overlay -->
    <div class="overlay"></div>

    <!-- Mensaje interacción -->
    <div class="tap-message" id="tapMessage">
        Toca la pantalla para activar el sonido
    </div>

    <script>
        const videos = document.querySelectorAll('video');
        const tapMessage = document.getElementById('tapMessage');

        document.addEventListener('click', () => {
            videos.forEach(video => {
                video.muted = false;
                video.play();
            });

            tapMessage.style.display = 'none';
        }, { once: true });
    </script>

</body>

</html>
